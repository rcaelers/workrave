[package]
name = "clang-rpc-gen"
version = "0.1.0"
edition = "2021"
description = "Generates gRPC C++ service adapters from annotated C++ headers, parsed via libclang. No IDL file, no changes to the annotated code."
license = "GPL-3.0-or-later"

[lib]
name = "clang_rpc_gen"
path = "src/lib.rs"

[[bin]]
name = "clang-rpc-gen"
path = "src/main.rs"

[dependencies]
clang = { version = "2.0.0", features = ["clang_10_0", "runtime"] }
askama = "0.16.0"
clap = { version = "4.6.4", features = ["derive"] }
anyhow = "1.0.104"
regex = "1.13.1"
shell-words = "1.1.0"
serde = { version = "1.0.229", features = ["derive"] }
serde_json = "1.0.151"

[dev-dependencies]
tempfile = "3.27.0"
